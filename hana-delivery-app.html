<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>花束納品管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --green:#2d6a4f;--green-light:#40916c;--green-pale:#d8f3dc;--green-muted:#b7e4c7;
  --amber:#e76f51;--amber-pale:#fde8e0;
  --blue:#1a73e8;--blue-pale:#e8f0fe;
  --purple:#6741d9;--purple-pale:#ede9fe;
  --red:#c0392b;--red-pale:#fdecea;
  --orange:#e67e22;--orange-pale:#fef0e7;
  --gray-50:#f8f9fa;--gray-100:#f1f3f4;--gray-200:#e8eaed;
  --gray-400:#9aa0a6;--gray-600:#5f6368;--gray-800:#3c4043;--gray-900:#202124;
  --white:#fff;--shadow-sm:0 1px 3px rgba(0,0,0,.08);--radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--gray-100);color:var(--gray-900);}
/* スクリーン：縦全体を使い、ボトムナビを固定 */
.screen{display:none;height:100dvh;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}
.app-header{background:var(--white);padding:14px 16px 12px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.back-btn{width:32px;height:32px;border:none;background:none;font-size:20px;cursor:pointer;color:var(--green);display:flex;align-items:center;justify-content:center;border-radius:50%;}
.back-btn:active{background:var(--gray-100);}
.app-title{font-size:16px;font-weight:600;color:var(--gray-900);}
.app-subtitle{font-size:11px;color:var(--gray-400);margin-top:1px;}
/* スクロール領域 */
.screen-body{flex:1;overflow-y:auto;padding:16px;padding-bottom:8px;}
/* ボトムナビ固定 */
.bottom-nav{background:var(--white);border-top:1px solid var(--gray-200);display:flex;flex-shrink:0;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 2px 13px;cursor:pointer;color:var(--gray-400);font-size:10px;gap:2px;border:none;background:none;}
.nav-tab .icon{font-size:20px;}
.nav-tab.active{color:var(--green);}
/* ステップバー */
.step-bar{display:flex;align-items:center;padding:10px 16px;background:var(--white);border-bottom:1px solid var(--gray-200);gap:0;flex-shrink:0;}
.step-item{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;}
.step-item:not(:last-child)::after{content:'';position:absolute;top:14px;left:60%;width:80%;height:2px;background:var(--gray-200);z-index:0;}
.step-item.done:not(:last-child)::after{background:var(--green);}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;z-index:1;position:relative;}
.step-circle.active{background:var(--green);color:var(--white);}
.step-circle.done{background:var(--green);color:var(--white);}
.step-circle.pending{background:var(--gray-200);color:var(--gray-400);}
.step-label{font-size:10px;margin-top:3px;color:var(--gray-400);font-weight:500;}
.step-label.active{color:var(--green);}
/* login */
#screen-login{background:var(--white);justify-content:center;align-items:center;padding:40px 24px;height:100dvh;}
.login-logo{font-size:48px;margin-bottom:8px;}
.login-title{font-size:22px;font-weight:700;color:var(--green);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--gray-400);margin-bottom:40px;}
.login-label{font-size:13px;font-weight:600;color:var(--gray-600);margin-bottom:12px;align-self:flex-start;width:100%;max-width:320px;}
.staff-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:320px;}
.staff-btn{background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);padding:14px 10px;font-size:14px;font-weight:600;color:var(--gray-800);cursor:pointer;text-align:center;}
.staff-btn:active{background:var(--green-pale);border-color:var(--green);color:var(--green);}
/* cards / section */
.section-label{font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:.08em;margin-bottom:8px;margin-top:20px;}
.section-label:first-child{margin-top:0;}
.card{background:var(--white);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-sm);margin-bottom:8px;}
/* store list */
.company-block{margin-bottom:8px;}
.company-header{background:var(--green);color:var(--white);border-radius:var(--radius);padding:12px 16px;font-size:14px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.company-header .chevron{transition:transform .2s;font-size:12px;}
.company-header.open .chevron{transform:rotate(180deg);}
.store-list{display:none;margin-top:2px;}
.store-list.open{display:block;}
.store-item{background:var(--white);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:2px;font-size:14px;color:var(--gray-800);cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;border:1.5px solid transparent;}
.store-item.done{border-color:var(--green);background:var(--green-pale);color:var(--green);font-weight:600;}
.store-item-name{font-size:14px;font-weight:600;}
.alert-badges{display:flex;flex-direction:column;gap:3px;align-items:flex-end;flex-shrink:0;margin-left:8px;}
.badge-alert{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.badge-warn{background:var(--orange-pale);color:var(--orange);}
.badge-danger{background:var(--red-pale);color:var(--red);}
.badge-water-warn{background:#fff8e1;color:#f57f17;}
.badge-water-danger{background:var(--blue-pale);color:var(--blue);}
/* 水替えチェック */
.water-check-row{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--blue-pale);border-radius:var(--radius-sm);margin-bottom:12px;}
.water-check-row label{font-size:14px;font-weight:600;color:var(--blue);cursor:pointer;display:flex;align-items:center;gap:8px;}
.water-checkbox{width:20px;height:20px;accent-color:var(--blue);cursor:pointer;}
/* product rows */
.product-row{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--gray-100);gap:8px;}
.product-row:last-child{border-bottom:none;padding-bottom:0;}
.product-row:first-child{padding-top:0;}
.product-info{flex:1;min-width:0;}
.product-name{font-size:13px;font-weight:600;color:var(--gray-900);}
/* qty control */
.qty-control{display:flex;align-items:center;flex-shrink:0;}
.qty-btn{width:38px;height:38px;border:1.5px solid var(--gray-200);background:var(--white);font-size:20px;font-weight:300;color:var(--gray-600);cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;line-height:1;touch-action:none;}
.qty-btn:first-child{border-radius:var(--radius-sm) 0 0 var(--radius-sm);}
.qty-btn:last-child{border-radius:0 var(--radius-sm) var(--radius-sm) 0;}
.qty-btn.pressing{background:var(--gray-100);}
.qty-btn.plus.pressing{background:var(--green-pale);border-color:var(--green);color:var(--green);}
.qty-display{width:46px;height:38px;border-top:1.5px solid var(--gray-200);border-bottom:1.5px solid var(--gray-200);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--gray-900);background:var(--white);cursor:pointer;user-select:none;position:relative;}
.qty-display.nonzero{background:var(--green-pale);color:var(--green);border-color:var(--green);}
.qty-display.nonzero-red{background:var(--red-pale);color:var(--red);border-color:var(--red);}
.qty-hint{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--gray-400);white-space:nowrap;font-weight:400;}
/* inventory input */
.inventory-input{width:80px;height:38px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);padding:0 10px;font-size:15px;font-weight:700;text-align:center;color:var(--gray-900);background:var(--white);outline:none;}
.inventory-input:focus{border-color:var(--blue);background:var(--blue-pale);}
.inventory-input.has-value{border-color:var(--blue);background:var(--blue-pale);color:var(--blue);}
.inventory-label{font-size:11px;color:var(--gray-400);text-align:center;margin-bottom:2px;}
/* extra / spot */
.add-item-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.add-item-select{flex:1;min-width:140px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);padding:9px 10px;font-size:13px;color:var(--gray-900);background:var(--white);outline:none;}
.add-item-select:focus{border-color:var(--green);}
.add-item-btn{background:var(--green-pale);border:1.5px solid var(--green-muted);border-radius:var(--radius-sm);padding:9px 14px;font-size:13px;font-weight:600;color:var(--green);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.section-divider{border:none;border-top:1px solid var(--gray-100);margin:10px 0;}
.spot-add-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px;}
.spot-input{flex:1;min-width:100px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);padding:9px 10px;font-size:13px;color:var(--gray-900);background:var(--white);outline:none;}
.spot-price-input{width:80px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);padding:9px 8px;font-size:13px;color:var(--gray-900);background:var(--white);outline:none;flex-shrink:0;}
.spot-add-btn{background:var(--amber-pale);border:1.5px solid #f4b5a0;border-radius:var(--radius-sm);padding:9px 14px;font-size:13px;font-weight:600;color:var(--amber);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.badge-spot{display:inline-block;font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600;background:var(--amber-pale);color:var(--amber);margin-left:4px;}
.badge-season{background:var(--purple-pale);color:var(--purple);font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600;margin-left:4px;}
.badge-casual{background:#fef9e7;color:#b7860b;font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600;margin-left:4px;}
/* memo */
.memo-input{width:100%;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;color:var(--gray-900);background:var(--white);outline:none;resize:none;font-family:inherit;line-height:1.5;}
.memo-input:focus{border-color:var(--green);}
/* action area */
.action-area{padding:12px 16px 16px;background:var(--white);border-top:1px solid var(--gray-200);flex-shrink:0;}
.btn-primary{width:100%;background:var(--green);color:var(--white);border:none;border-radius:var(--radius);padding:15px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.btn-primary:active{background:var(--green-light);transform:scale(.98);}
.btn-primary:disabled{background:var(--gray-200);color:var(--gray-400);}
.btn-secondary{width:100%;background:var(--white);color:var(--green);border:1.5px solid var(--green);border-radius:var(--radius);padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;}
.btn-secondary:active{background:var(--green-pale);}
.btn-return{background:var(--red);color:var(--white);border:none;border-radius:var(--radius);padding:15px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;}
.btn-return:disabled{background:var(--gray-200);color:var(--gray-400);}
.action-summary{font-size:12px;color:var(--gray-400);text-align:center;margin-top:4px;}
/* success */
#screen-success{background:var(--white);justify-content:center;align-items:center;padding:40px 24px;}
.success-icon{font-size:64px;margin-bottom:16px;}
.success-title{font-size:20px;font-weight:700;color:var(--green);margin-bottom:8px;}
.success-detail{font-size:13px;color:var(--gray-600);text-align:center;line-height:1.7;margin-bottom:32px;}
.success-detail strong{color:var(--gray-900);font-weight:700;}
.success-actions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px;}
.btn-outline{background:var(--white);border:1.5px solid var(--green);border-radius:var(--radius);padding:14px;font-size:14px;font-weight:600;color:var(--green);cursor:pointer;text-align:center;}
.btn-solid{background:var(--green);border:none;border-radius:var(--radius);padding:14px;font-size:14px;font-weight:600;color:var(--white);cursor:pointer;text-align:center;}
/* history */
.hist-tabs{background:var(--white);border-bottom:1px solid var(--gray-200);display:flex;padding:0 12px;gap:4px;flex-shrink:0;}
.hist-tab{flex:1;padding:10px 4px;border:none;background:none;font-size:12px;font-weight:600;color:var(--gray-400);border-bottom:2px solid transparent;cursor:pointer;}
.hist-tab.active{color:var(--green);border-bottom:2px solid var(--green);}
.history-item{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow-sm);}
.history-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.history-store{font-size:14px;font-weight:700;}
.history-meta{font-size:11px;color:var(--gray-400);margin-top:2px;}
.history-products{display:flex;flex-wrap:wrap;gap:6px;}
.history-tag{font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px;}
.tag-delivery{background:var(--green-pale);color:var(--green);}
.tag-return{background:var(--red-pale);color:var(--red);}
.tag-inventory{background:var(--blue-pale);color:var(--blue);}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray-400);font-size:14px;}
/* summary tabs */
.sum-tabs{background:var(--white);border-bottom:1px solid var(--gray-200);display:flex;padding:0 8px;flex-shrink:0;}
.sum-tab{flex:1;padding:10px 2px;border:none;background:none;font-size:12px;font-weight:600;color:var(--gray-400);border-bottom:2px solid transparent;cursor:pointer;}
.sum-tab.active{color:var(--green);border-bottom:2px solid var(--green);}
/* calendar */
.cal-tabs{background:var(--white);border-bottom:1px solid var(--gray-200);display:flex;padding:0 12px;flex-shrink:0;}
.cal-tab{flex:1;padding:10px 4px;border:none;background:none;font-size:12px;font-weight:600;color:var(--gray-400);border-bottom:2px solid transparent;cursor:pointer;}
.cal-tab.active{color:var(--green);border-bottom:2px solid var(--green);}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--white);border-bottom:1px solid var(--gray-200);flex-shrink:0;}
.cal-nav-btn{border:none;background:none;font-size:20px;cursor:pointer;color:var(--green);padding:4px 8px;}
.cal-month-label{font-size:15px;font-weight:700;color:var(--gray-900);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--gray-200);}
.cal-dow{background:var(--gray-50);text-align:center;font-size:11px;font-weight:700;color:var(--gray-400);padding:6px 0;}
.cal-day{background:var(--white);min-height:64px;padding:4px;position:relative;cursor:pointer;}
.cal-day.other-month{background:var(--gray-50);}
.cal-day.today-cell{background:#fffde7;}
.cal-day-num{font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:2px;}
.cal-day.today-cell .cal-day-num{color:var(--green);font-weight:800;}
.cal-dot-wrap{display:flex;flex-direction:column;gap:2px;}
.cal-dot{font-size:10px;border-radius:3px;padding:1px 4px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-dot-delivery{background:var(--green-pale);color:var(--green);}
.cal-dot-water{background:var(--blue-pale);color:var(--blue);}
/* store status list for calendar */
.store-status-item{background:var(--white);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;box-shadow:var(--shadow-sm);}
.store-status-name{font-size:14px;font-weight:600;color:var(--gray-900);}
.store-status-badges{display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
/* overlay */
.qty-edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;}
.qty-edit-box{background:var(--white);border-radius:16px;padding:24px 20px;width:240px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.qty-edit-title{font-size:13px;color:var(--gray-400);margin-bottom:4px;}
.qty-edit-product{font-size:14px;font-weight:700;color:var(--gray-900);margin-bottom:16px;}
.qty-edit-input{width:100%;border:2px solid var(--green);border-radius:var(--radius-sm);padding:12px;font-size:28px;font-weight:700;text-align:center;color:var(--green);outline:none;background:var(--green-pale);}
.qty-edit-input.red{border-color:var(--red);color:var(--red);background:var(--red-pale);}
.qty-edit-actions{display:flex;gap:8px;margin-top:14px;}
.qty-edit-cancel{flex:1;padding:12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--white);font-size:14px;font-weight:600;color:var(--gray-600);cursor:pointer;}
.qty-edit-ok{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);background:var(--green);font-size:14px;font-weight:600;color:var(--white);cursor:pointer;}
.qty-edit-ok.red{background:var(--red);}
/* mode banner */
.mode-banner{padding:8px 16px;font-size:12px;font-weight:700;text-align:center;letter-spacing:.05em;flex-shrink:0;}
.mode-banner.return{background:var(--red-pale);color:var(--red);}
.mode-banner.delivery{background:var(--green-pale);color:var(--green);}
.mode-banner.inventory{background:var(--blue-pale);color:var(--blue);}
/* toast / loading */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--gray-900);color:var(--white);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.spinner{width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--gray-600);}
.user-tag{display:inline-flex;align-items:center;gap:4px;background:var(--green-pale);color:var(--green);border-radius:20px;padding:3px 10px 3px 6px;font-size:12px;font-weight:600;}
.user-tag .dot{width:8px;height:8px;background:var(--green);border-radius:50%;}
.today-label{font-size:13px;color:var(--gray-400);text-align:center;margin-bottom:16px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-logo">🌸</div>
  <div class="login-title">花束納品管理</div>
  <div class="login-sub">名前を選んでください</div>
  <div class="login-label">スタッフ</div>
  <div class="staff-grid" id="staff-grid"></div>
</div>

<!-- MAIN -->
<div id="screen-main" class="screen">
  <div class="app-header">
    <div style="flex:1;"><div class="app-title">🌸 花束納品管理</div></div>
    <div id="header-user"></div>
  </div>
  <div class="screen-body">
    <div class="today-label" id="today-label"></div>
    <div class="section-label">納品先を選ぶ</div>
    <div id="company-list"></div>
    <div style="height:8px;"></div>
  </div>
  <div class="bottom-nav">
    <button class="nav-tab active" onclick="showMain()"><span class="icon">📦</span>納品入力</button>
    <button class="nav-tab" onclick="showHistory()"><span class="icon">📋</span>本日の記録</button>
    <button class="nav-tab" onclick="showSummary()"><span class="icon">📊</span>集計</button>
    <button class="nav-tab" onclick="showCalendar()"><span class="icon">📅</span>カレンダー</button>
    <button class="nav-tab" onclick="logout()"><span class="icon">👤</span>変更</button>
  </div>
</div>

<!-- STEP1: 返品入力 -->
<div id="screen-return" class="screen">
  <div class="app-header">
    <button class="back-btn" onclick="goBack('screen-main')">←</button>
    <div style="flex:1;">
      <div class="app-title" id="return-store-name"></div>
      <div class="app-subtitle" id="return-company-name"></div>
    </div>
  </div>
  <div class="step-bar" id="step-bar-return"></div>
  <div class="mode-banner return">① 返品入力 — 売れ残り・傷んだ花の数</div>
  <div class="screen-body">
    <!-- 水替えチェック -->
    <div class="water-check-row">
      <label>
        <input type="checkbox" id="water-change-check" class="water-checkbox">
        💧 本日、水替えを行った
      </label>
    </div>
    <div class="section-label">定番商品</div>

// step bar
function renderStepBar(cid,step){
  const steps=[{label:'返品',n:1},{label:'納品',n:2},{label:'棚卸',n:3}];
  const el=document.getElementById(cid);el.innerHTML='';
  steps.forEach(s=>{
    const item=document.createElement('div');item.className='step-item'+(step>s.n?' done':'');
    const c=document.createElement('div');c.className='step-circle '+(s.n===step?'active':s.n<step?'done':'pending');
    c.textContent=s.n<step?'✓':s.n;
    const l=document.createElement('div');l.className='step-label'+(s.n===step?' active':'');l.textContent=s.label;
    item.appendChild(c);item.appendChild(l);el.appendChild(item);
  });
}

async function showMain(){

async function loadTodayRecords(){
  try{const{data}=await sb.from('delivery_records').select('*').eq('delivery_date',todayISO());todayRecords=data||[];}
  catch(e){todayRecords=[];}
}
async function loadStoreLastData(){
  // 全店舗の最新納品日・最新水替え日を取得（過去60日分）
  try{
    const from=new Date();from.setDate(from.getDate()-60);
    const{data}=await sb.from('delivery_records')
      .select('store_id,delivery_date,record_type,water_change')
      .gte('delivery_date',dateISO(from))
      .in('record_type',['delivery','return'])
      .order('delivery_date',{ascending:false});
    storeLastData={};
    (data||[]).forEach(r=>{
      if(!storeLastData[r.store_id])storeLastData[r.store_id]={lastDelivery:null,lastWater:null};
      if(r.record_type==='delivery'&&!storeLastData[r.store_id].lastDelivery)
        storeLastData[r.store_id].lastDelivery=r.delivery_date;
      if(r.water_change&&!storeLastData[r.store_id].lastWater)
        storeLastData[r.store_id].lastWater=r.delivery_date;
    });
  }catch(e){}
}

function buildCompanyList(){
  const el=document.getElementById('company-list');el.innerHTML='';
  const td=todayISO();
  COMPANIES.forEach(company=>{
    const block=document.createElement('div');block.className='company-block';
    const header=document.createElement('div');header.className='company-header open';
    header.innerHTML=`${company.name} <span class="chevron">▼</span>`;
    const storeList=document.createElement('div');storeList.className='store-list open';
    header.onclick=()=>{header.classList.toggle('open');storeList.classList.toggle('open');};
    company.stores.forEach(store=>{
      const done=todayRecords.some(r=>r.store_id===store.id&&r.record_type==='delivery');
      const last=storeLastData[store.id]||{};
      const item=document.createElement('div');item.className='store-item'+(done?' done':'');

      // アラートバッジ計算
      const badges=[];
      if(last.lastDelivery){
        const d=diffDays(last.lastDelivery,td);
        if(d>=7)badges.push({cls:'badge-danger',text:`⚠ ${d}日経過`});
        else if(d>=3)badges.push({cls:'badge-warn',text:`${d}日経過`});
      } else {
        badges.push({cls:'badge-warn',text:'未納品'});
      }
      if(last.lastWater){
        const w=diffDays(last.lastWater,td);
        if(w>=7)badges.push({cls:'badge-water-danger',text:'💧 水替えして'});
        else if(w>=5)badges.push({cls:'badge-water-warn',text:'💧 そろそろ水替え'});
      } else {
        badges.push({cls:'badge-water-warn',text:'💧 水替え未記録'});
      }

      const badgeHtml=badges.map(b=>`<span class="badge-alert ${b.cls}">${b.text}</span>`).join('');
      item.innerHTML=`
        <div>
          <div class="store-item-name">${store.name}</div>
          ${done?'<div style="font-size:11px;color:var(--green);margin-top:2px;">✓ 本日入力済</div>':''}
        </div>
        <div class="alert-badges">${badgeHtml}</div>
      `;
      item.onclick=()=>openReturn(company,store);
      storeList.appendChild(item);
    });
    block.appendChild(header);block.appendChild(storeList);el.appendChild(block);
  });
}

// ===== 数量コントロール =====
function makeQtyControl(id,getName,mode){
  const w=document.createElement('div');w.className='qty-control';
  const minus=document.createElement('button');minus.className='qty-btn minus';minus.textContent='−';
  const disp=document.createElement('div');disp.className='qty-display';disp.id='qty-'+id;
  disp.innerHTML='0<span class="qty-hint">タップで入力</span>';
  const plus=document.createElement('button');plus.className='qty-btn plus';plus.textContent='+';
  disp.addEventListener('click',()=>openQtyEdit(id,getName(),mode));
  function startLP(btn,delta){
    btn.classList.add('pressing');changeQtyById(id,delta,mode);
    longPressTimer=setTimeout(()=>{longPressInterval=setInterval(()=>changeQtyById(id,delta,mode),80);},400);
  }
  function endLP(btn){btn.classList.remove('pressing');clearTimeout(longPressTimer);clearInterval(longPressInterval);}
  ['mousedown','touchstart'].forEach(e=>{
    minus.addEventListener(e,ev=>{ev.preventDefault();startLP(minus,-1);},{passive:false});
    plus.addEventListener(e,ev=>{ev.preventDefault();startLP(plus,1);},{passive:false});
  });
  ['mouseup','mouseleave','touchend','touchcancel'].forEach(e=>{
    minus.addEventListener(e,()=>endLP(minus));plus.addEventListener(e,()=>endLP(plus));
  });
  w.appendChild(minus);w.appendChild(disp);w.appendChild(plus);return w;
}
function getQtyStore(id,mode){
  if(mode==='return'){
    if(id.startsWith('ret_extra_'))return{arr:returnExtra};
    return{obj:returnQty,key:id.replace('ret_','')};
  }
  if(id.startsWith('del_extra_'))return{arr:deliveryExtra};
  if(id.startsWith('spot_'))return{arr:spotProducts};
  return{obj:deliveryQty,key:id.replace('del_','')};
}
function changeQtyById(id,delta,mode){
  const s=getQtyStore(id,mode);
  if(s.arr){
    const item=s.arr.find(i=>i._uid===id);
    if(item){
      item.qty=Math.max(0,(item.qty||0)+delta);
      if(item.qty===0&&id.startsWith('spot_')){spotProducts=spotProducts.filter(i=>i._uid!==id);renderDeliverySpots();updateDeliverySummary();return;}
      refreshQtyDisplay(id,item.qty,mode);
    }
  }else if(s.obj){s.obj[s.key]=Math.max(0,(s.obj[s.key]||0)+delta);refreshQtyDisplay(id,s.obj[s.key],mode);}
  if(mode==='return')updateReturnSummary();else updateDeliverySummary();
}
function refreshQtyDisplay(id,val,mode){
  const d=document.getElementById('qty-'+id);if(!d)return;
  const red=mode==='return';
  d.className='qty-display'+(val>0?(red?' nonzero-red':' nonzero'):'');
  d.innerHTML=val+'<span class="qty-hint">タップで入力</span>';
}
function openQtyEdit(id,name,mode){
  qtyEditTarget=id;qtyEditMode=mode;
  const s=getQtyStore(id,mode);
  let cur=0;
  if(s.arr){const it=s.arr.find(i=>i._uid===id);cur=it?it.qty:0;}
  else if(s.obj){cur=s.obj[s.key]||0;}
  const red=mode==='return';
  document.getElementById('qty-edit-title').textContent=red?'返品数を直接入力':'納品数を直接入力';
  document.getElementById('qty-edit-label').textContent=name;
  const inp=document.getElementById('qty-edit-input');
  inp.className='qty-edit-input'+(red?' red':'');inp.value=cur===0?'':cur;
  document.getElementById('qty-edit-ok').className='qty-edit-ok'+(red?' red':'');
  document.getElementById('qty-overlay').style.display='flex';
  setTimeout(()=>{inp.focus();inp.select();},100);
}
function closeQtyEdit(e){
  if(e&&e.target!==document.getElementById('qty-overlay'))return;
  document.getElementById('qty-overlay').style.display='none';qtyEditTarget=null;
}
function confirmQtyEdit(){
  const val=Math.max(0,parseInt(document.getElementById('qty-edit-input').value)||0);
  const id=qtyEditTarget,mode=qtyEditMode;
  if(id){
    const s=getQtyStore(id,mode);
    if(s.arr){
      const item=s.arr.find(i=>i._uid===id);
      if(item){
        item.qty=val;
        if(val===0&&id.startsWith('spot_')){spotProducts=spotProducts.filter(i=>i._uid!==id);renderDeliverySpots();}
        else refreshQtyDisplay(id,val,mode);
      }
    }else if(s.obj){s.obj[s.key]=val;refreshQtyDisplay(id,val,mode);}
    if(mode==='return')updateReturnSummary();else updateDeliverySummary();
  }
  document.getElementById('qty-overlay').style.display='none';qtyEditTarget=null;
}
document.getElementById('qty-edit-input').addEventListener('keydown',e=>{if(e.key==='Enter')confirmQtyEdit();});

let currentSumTab='today';
async function showSummary(){
  show('screen-summary');
  document.getElementById('range-from').value=todayISO();
  document.getElementById('range-to').value=todayISO();
  await loadSummary();
}
function switchSumTab(tab){
  currentSumTab=tab;
  ['today','week','month','custom'].forEach(t=>{document.getElementById('stab-'+t).className='sum-tab'+(t===tab?' active':'');});
  document.getElementById('custom-range').style.display=tab==='custom'?'flex':'none';
  loadSummary();
}
function getSumRange(){
  const now=new Date(),iso=d=>d.toISOString().slice(0,10);
  if(currentSumTab==='today')return{from:todayISO(),to:todayISO()};
  if(currentSumTab==='week'){const d=now.getDay(),m=new Date(now);m.setDate(now.getDate()-(d===0?6:d-1));return{from:iso(m),to:todayISO()};}
  if(currentSumTab==='month')return{from:`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`,to:todayISO()};
  return{from:document.getElementById('range-from').value||todayISO(),to:document.getElementById('range-to').value||todayISO()};
}
async function loadSummary(){
  const{from,to}=getSumRange();showLoading('集計中...');
  try{
    const{data,error}=await sb.from('delivery_records').select('*,delivery_items(*)').in('record_type',['delivery','return']).gte('delivery_date',from).lte('delivery_date',to);
    if(error)throw error;hideLoading();renderSummary(data||[],from,to);
  }catch(e){hideLoading();showToast('読み込みに失敗しました',true);}
}
function renderSummary(recs,from,to){
  const el=document.getElementById('summary-content');el.innerHTML='';
  const periodLabel=from===to?from:`${from} 〜 ${to}`;
  const allProducts=[...STANDARD_PRODUCTS.map(p=>p.name)];
  recs.forEach(r=>(r.delivery_items||[]).forEach(i=>{if(!allProducts.includes(i.product_name))allProducts.push(i.product_name);}));
  const cids=COMPANIES.map(c=>c.id);
  const ct={};
  COMPANIES.forEach(c=>{ct[c.id]={delivery:{},return:{}};allProducts.forEach(p=>{ct[c.id].delivery[p]=0;ct[c.id].return[p]=0;});});
  recs.forEach(r=>{const co=ct[r.company_id];if(!co)return;(r.delivery_items||[]).forEach(i=>{if(co[r.record_type]){if(!co[r.record_type][i.product_name])co[r.record_type][i.product_name]=0;co[r.record_type][i.product_name]+=i.quantity;}});});
  const vis=allProducts.filter(p=>cids.reduce((s,c)=>s+(ct[c]?.delivery[p]||0)+(ct[c]?.return[p]||0),0)>0);
  if(!vis.length){el.innerHTML=`<div style="text-align:center;font-size:12px;color:var(--gray-400);margin-bottom:12px;">${periodLabel}</div><div class="empty-state">📭 この期間のデータがありません</div>`;return;}
  const tw=document.createElement('div');tw.style='overflow-x:auto;';
  let h=`<div style="text-align:center;font-size:12px;color:var(--gray-400);margin-bottom:12px;">${periodLabel}</div>
  <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:400px;">
  <thead>
    <tr style="background:var(--gray-100);">
      <th style="padding:8px 10px;text-align:left;font-weight:700;color:var(--gray-600);border-bottom:2px solid var(--gray-200);">品目</th>
      ${COMPANIES.map(c=>`<th style="padding:8px 6px;text-align:center;font-weight:700;color:var(--gray-600);border-bottom:2px solid var(--gray-200);font-size:10px;" colspan="2">${c.name}</th>`).join('')}
      <th style="padding:8px 6px;text-align:center;font-weight:700;color:var(--gray-900);border-bottom:2px solid var(--gray-200);font-size:11px;" colspan="2">合計</th>
    </tr>
    <tr style="background:var(--gray-50);">
      <th style="padding:4px 10px;border-bottom:1px solid var(--gray-200);"></th>
      ${cids.map(()=>`<th style="padding:4px 6px;text-align:center;font-size:10px;color:var(--green);border-bottom:1px solid var(--gray-200);">納品</th><th style="padding:4px 6px;text-align:center;font-size:10px;color:var(--red);border-bottom:1px solid var(--gray-200);">返品</th>`).join('')}
      <th style="padding:4px 6px;text-align:center;font-size:10px;color:var(--green);border-bottom:1px solid var(--gray-200);">納品</th>
      <th style="padding:4px 6px;text-align:center;font-size:10px;color:var(--red);border-bottom:1px solid var(--gray-200);">返品</th>
    </tr>
  </thead><tbody>`;
  let gd=0,gr=0;
  vis.forEach((p,idx)=>{
    const bg=idx%2===0?'var(--white)':'var(--gray-50)';
    let td=0,tr=0;
    const cells=cids.map(c=>{const d=ct[c]?.delivery[p]||0,r=ct[c]?.return[p]||0;td+=d;tr+=r;return`<td style="padding:8px 6px;text-align:center;color:${d>0?'var(--green)':'var(--gray-400)'};">${d>0?d:'—'}</td><td style="padding:8px 6px;text-align:center;color:${r>0?'var(--red)':'var(--gray-400)'};">${r>0?r:'—'}</td>`;}).join('');
    gd+=td;gr+=tr;
    h+=`<tr style="background:${bg};"><td style="padding:8px 10px;font-weight:600;white-space:nowrap;">${p}</td>${cells}<td style="padding:8px 6px;text-align:center;font-weight:700;color:var(--green);">${td}</td><td style="padding:8px 6px;text-align:center;font-weight:700;color:var(--red);">${tr}</td></tr>`;
  });
  h+=`<tr style="background:var(--gray-100);border-top:2px solid var(--gray-200);">
    <td style="padding:8px 10px;font-weight:700;">合計</td>
    ${cids.map(c=>{const d=vis.reduce((s,p)=>s+(ct[c]?.delivery[p]||0),0),r=vis.reduce((s,p)=>s+(ct[c]?.return[p]||0),0);return`<td style="padding:8px 6px;text-align:center;font-weight:700;color:var(--green);">${d}</td><td style="padding:8px 6px;text-align:center;font-weight:700;color:var(--red);">${r}</td>`;}).join('')}
    <td style="padding:8px 6px;text-align:center;font-weight:700;color:var(--green);">${gd}</td>
    <td style="padding:8px 6px;text-align:center;font-weight:700;color:var(--red);">${gr}</td>
  </tr></tbody></table>
  <div style="font-size:11px;color:var(--gray-400);padding:8px 4px;text-align:center;">※ 横にスクロールできます</div>`;
  tw.innerHTML=h;el.appendChild(tw);
}

// ===== カレンダー =====
let currentCalTab='calendar';
async function showCalendar(){
  show('screen-calendar');
  if(currentCalTab==='calendar')await renderCalendar();
  else await renderStatusList();
}
function switchCalTab(tab){
  currentCalTab=tab;
  ['calendar','status'].forEach(t=>{document.getElementById('ctab-'+t).className='cal-tab'+(t===tab?' active':'');});
  document.getElementById('cal-calendar-view').style.display=tab==='calendar'?'flex':'none';
  document.getElementById('cal-status-view').style.display=tab==='status'?'block':'none';
  if(tab==='calendar')renderCalendar();else renderStatusList();
}
function setCalFilter(f){
  calFilter=f;
  ['all','montour','shufu','aoki'].forEach(k=>{
    const btn=document.getElementById('cf-'+k);
    if(k===f){btn.style.background='var(--green-pale)';btn.style.borderColor='var(--green-muted)';btn.style.color='var(--green)';}
    else{btn.style.background='var(--gray-100)';btn.style.borderColor='var(--gray-200)';btn.style.color='var(--gray-600)';}
  });
  renderCalendar();
}
function changeCalMonth(d){calMonth+=d;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
async function renderCalendar(){
  document.getElementById('cal-month-label').textContent=`${calYear}年 ${calMonth+1}月`;
  // 月初〜月末のデータ取得
  const from=`${calYear}-${String(calMonth+1).padStart(2,'0')}-01`;
  const lastDay=new Date(calYear,calMonth+1,0).getDate();
  const to=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  try{
    const{data}=await sb.from('delivery_records').select('delivery_date,store_id,company_id,record_type,water_change').in('record_type',['delivery','return']).gte('delivery_date',from).lte('delivery_date',to);
    calData={};
    (data||[]).forEach(r=>{
      if(calFilter!=='all'&&r.company_id!==calFilter)return;
      if(!calData[r.delivery_date])calData[r.delivery_date]=[];
      calData[r.delivery_date].push(r);
    });
  }catch(e){calData={};}
  buildCalGrid();
}
function buildCalGrid(){
  // 曜日ヘッダー
  const dh=document.getElementById('cal-dow-header');
  dh.innerHTML=['日','月','火','水','木','金','土'].map((d,i)=>`<div class="cal-dow" style="${i===0?'color:var(--red)':i===6?'color:var(--blue)':''}">${d}</div>`).join('');
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const lastDate=new Date(calYear,calMonth+1,0).getDate();
  const todayStr=todayISO();
  // 前月の空白
  for(let i=0;i<firstDay;i++){const d=document.createElement('div');d.className='cal-day other-month';grid.appendChild(d);}
  for(let date=1;date<=lastDate;date++){
    const iso=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(date).padStart(2,'0')}`;
    const isToday=iso===todayStr;
    const cell=document.createElement('div');
    cell.className='cal-day'+(isToday?' today-cell':'');
    const dayNum=document.createElement('div');dayNum.className='cal-day-num';dayNum.textContent=date;
    cell.appendChild(dayNum);
    const dotWrap=document.createElement('div');dotWrap.className='cal-dot-wrap';
    const entries=calData[iso]||[];
    // 店舗名の重複を除いてドット表示
    const stores=new Set();
    const waters=new Set();
    entries.forEach(e=>{
      if(e.record_type==='delivery')stores.add(e.store_id);
      if(e.water_change)waters.add(e.store_id);
    });
    stores.forEach(sid=>{
      const sName=COMPANIES.flatMap(c=>c.stores).find(s=>s.id===sid)?.name||sid;
      const dot=document.createElement('div');dot.className='cal-dot cal-dot-delivery';dot.textContent=sName;dotWrap.appendChild(dot);
    });
    waters.forEach(sid=>{
      const sName=COMPANIES.flatMap(c=>c.stores).find(s=>s.id===sid)?.name||sid;
      const dot=document.createElement('div');dot.className='cal-dot cal-dot-water';dot.textContent='💧'+sName;dotWrap.appendChild(dot);
    });
    cell.appendChild(dotWrap);grid.appendChild(cell);
  }
}
async function renderStatusList(){
  const el=document.getElementById('status-list');el.innerHTML='';
  await loadStoreLastData();
  const td=todayISO();
  COMPANIES.forEach(company=>{
    const coLabel=document.createElement('div');
    coLabel.style='font-size:11px;font-weight:700;color:var(--gray-400);margin:12px 0 6px;';
    coLabel.textContent=company.name;
    el.appendChild(coLabel);
    company.stores.forEach(store=>{
      const last=storeLastData[store.id]||{};
      const item=document.createElement('div');item.className='store-status-item';
      const badges=[];
      if(last.lastDelivery){
        const d=diffDays(last.lastDelivery,td);
        if(d>=7)badges.push({cls:'badge-danger',text:`⚠ 前回納品から${d}日経過`});
        else if(d>=3)badges.push({cls:'badge-warn',text:`前回納品から${d}日経過`});
        else badges.push({cls:'',text:`前回納品：${last.lastDelivery}（${d}日前）`,style:'font-size:11px;color:var(--gray-400);'});
      }else{badges.push({cls:'badge-danger',text:'納品記録なし'});}
      if(last.lastWater){
        const w=diffDays(last.lastWater,td);
        if(w>=7)badges.push({cls:'badge-water-danger',text:`💧 水替えしてください（${w}日経過）`});
        else if(w>=5)badges.push({cls:'badge-water-warn',text:`💧 そろそろ水替え（${w}日経過）`});
        else badges.push({cls:'',text:`💧 前回水替え：${last.lastWater}（${w}日前）`,style:'font-size:11px;color:var(--gray-400);'});
      }else{badges.push({cls:'badge-water-warn',text:'💧 水替え記録なし'});}
      const badgeHtml=badges.map(b=>b.cls?`<span class="badge-alert ${b.cls}">${b.text}</span>`:`<span style="${b.style||''}">${b.text}</span>`).join('');
      item.innerHTML=`<div class="store-status-name">${store.name}</div><div class="store-status-badges">${badgeHtml}</div>`;
      el.appendChild(item);
    });
  });
}
</script>
